name: Release APK

# Push a tag like v1.2.0 to build the Android APK and publish it as a
# GitHub Release. Every app version should be released this way.
#
# Signing: when the RELEASE_KEYSTORE_BASE64 / RELEASE_KEYSTORE_PASSWORD /
# RELEASE_KEY_ALIAS / RELEASE_KEY_PASSWORD secrets are configured, the
# workflow builds a signed release APK. Until then it publishes the
# debug-signed APK, which is installable for sideloading/testing but NOT
# suitable for the Play Store.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TrainvocClient

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.keystore.outputs.signed == 'true'
        env:
          TRAINVOC_KEYSTORE_PATH: ${{ github.workspace }}/TrainvocClient/release.keystore
          TRAINVOC_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          TRAINVOC_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          TRAINVOC_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build debug-signed APK (no keystore configured)
        if: steps.keystore.outputs.signed == 'false'
        run: ./gradlew assembleDebug

      - name: Collect APKs
        id: apk
        env:
          SIGNED: ${{ steps.keystore.outputs.signed }}
        run: |
          mkdir -p out
          find app/build/outputs/apk -name "*.apk" -exec cp {} out/ \;
          # Guard against publishing an unsigned APK labeled as signed: the
          # gradle signing config silently skips signing when any TRAINVOC_*
          # variable is missing and emits app-release-unsigned.apk.
          if [ "$SIGNED" = "true" ] && ls out/ | grep -q "unsigned"; then
            echo "::error::Keystore secrets are set but gradle produced an UNSIGNED APK — check RELEASE_KEYSTORE_PASSWORD/RELEASE_KEY_ALIAS/RELEASE_KEY_PASSWORD secrets."
            exit 1
          fi
          for f in out/*.apk; do
            mv "$f" "${f%.apk}-${GITHUB_REF_NAME}.apk"
          done
          ls -la out/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TrainvocClient/out/*.apk
          generate_release_notes: true
          body: |
            Trainvoc Android ${{ github.ref_name }}

            ${{ steps.keystore.outputs.signed == 'true'
              && 'Signed release APK.'
              || '⚠️ Debug-signed APK (release keystore secrets not configured yet) — fine for sideloading/testing, not for the Play Store.' }}
