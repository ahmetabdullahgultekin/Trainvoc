name: Bug report
description: Report something that is broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - TrainvocClient (Android)
        - TrainvocWeb (React)
        - TrainvocBackend (Spring Boot)
        - Repo / CI / docs
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / commit
      placeholder: e.g. v1.0.0 or commit sha
  - type: input
    id: device
    attributes:
      label: Device / OS / browser
      placeholder: e.g. Pixel 7, Android 15 / Chrome 130
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Logcat output, stack traces, or screenshots if available.
